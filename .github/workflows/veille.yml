name: Veille AO vétérinaires

on:
  schedule:
    - cron: "0 20 * * *"   # 20h00 UTC chaque jour
  workflow_dispatch: {}     # bouton "Run workflow" manuel

permissions:
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la collecte
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 main.py

      - name: Publier les résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add ao.json vus.json index.html dernier_run.txt
          git diff --cached --quiet || git commit -m "Mise à jour automatique de la veille"
          git push
